# instability_probe.yaml
#
# Small proxy for studying training instability.
# Purpose: surface loss spikes / divergence quickly without running a full baseline.
#
# Key differences from baseline:
#   - LR pushed high (3e-3 = 10x baseline) — sits near or above divergence threshold
#   - All stabilisers OFF by default (z_loss_coeff=0, qk_norm=false)
#   - 2000 steps — long enough to see spike patterns, short enough to iterate fast
#   - Log every step (train_log_every: 1) so spikes aren't missed between checkpoints
#   - Anomaly detection ON to catch NaN/Inf at the exact op
#
# Workflow:
#   1. Run with defaults (high LR, no stabilisers) — expect divergence or spikes
#   2. Enable z_loss_coeff: 1e-4   → does z-loss suppress spikes?
#   3. Enable attention.qk_norm: true → does QK-norm help?
#   4. Lower lr back toward 3e-4   → find the threshold

model:
  vocab_size: 16000
  max_seq_len: 512
  num_layers: 4
  model_dim: 256
  norm_type: "rmsnorm"
  norm_eps: 1.0e-6
  use_bias: false
  tie_embeddings: false

  attention:
    attention_type: "baseline"
    num_heads: 4
    num_kv_heads: 4
    rope_base: 10000.0
    qk_norm: false        # toggle: true to test QK-norm stabilisation

  mlp:
    mlp_type: "gelu"
    mlp_mult: 4.0

  init:
    use_fan_in_init: true

optimizer:
  optimizer_type: "adamw"
  lr: 3.0e-3              # 10x baseline — near/above instability threshold
  weight_decay: 1.0e-4
  beta1: 0.9
  beta2: 0.95
  eps: 1.0e-8

scheduler:
  scheduler_type: "cosine_with_warmup"
  warmup_steps: 100
  t_max: 2000
  eta_min: 1.0e-5

logging:
  use_print_callback: true
  use_wandb: true
  wandb_project: "slm-instability"
  wandb_run_name: null
  wandb_tags: ["instability-probe", "fineweb-edu"]

trainer:
  device: "cuda"
  precision: "bf16"
  seed: 42

  train_tokenizer_before_fit: true
  text_key: "text"
  max_seq_len: 512

  max_steps: 2000
  grad_accum_steps: 32  # 8 * 32 = 256 effective batch size (paper default)
  clip_grad_norm: 1.0

  train_log_every: 1      # log every step — catch spikes, don't miss them
  eval_every: 200
  max_eval_batches: 20

  save_checkpoints: false
  save_best_checkpoint: false
  num_sanity_val_steps: 0

  enable_anomaly_detection: true   # pinpoints the exact op that produces NaN/Inf
  z_loss_coeff: 1e-4        # toggle: 1e-4 to test z-loss stabilisation
  independent_weight_decay: 1.0e-4
  log_attn_logits: true


data:
  mode: text
  backend: torch
  source_type: huggingface
  dataset_name: HuggingFaceFW/fineweb-edu
  dataset_config_name: sample-10BT
  train_split_name: train
  streaming: true
  text_fields: ["text"]

  val_fraction: 0.05
  split_seed: 42
  seed: 42
  shuffle: true
  shuffle_buffer_size: 1000
  max_train_samples: 20000
  max_val_samples: 200

  seq_len: 512
  batch_size: 8
  num_workers: 0
  pin_memory: true
  drop_last: true

tokenizer:
  tokenizer_type: "bpe"
  vocab_size: 16000
  min_frequency: 2
  pad_token: "<pad>"
  eos_token: "<eos>"
  unk_token: "<unk>"
  bos_token: null
  reuse_existing: true
  tokenizer_train_samples: 10000
  tokenizer_path: "artifacts/tokenizer/smoke/tokenizer.json"
  allow_missing_tokenizer: true

# first_benchmark.yaml
#
# Fixed baseline for LR sweep benchmarking.
# Everything is locked except lr — change only lr between runs.
#
# Key choices (deliberate, not default):
#   - LayerNorm (not RMSNorm) — paper-standard for first benchmark
#   - seq_len 128              — short context, fast iterations
#   - fp32                     — removes precision as a confound
#   - weight_decay 0.1         — standard AdamW default
#   - no z-loss, no qk-norm    — baseline with no stabilisers
#   - dropout 0.0              — no noise

model:
  vocab_size: 16000
  max_seq_len: 128
  num_layers: 4
  model_dim: 256
  norm_type: "layernorm"
  tie_embeddings: false

  attention:
    attention_type: "baseline"
    num_heads: 4
    num_kv_heads: 4
    rope_base: 10000.0
    qk_norm: false

  mlp:
    mlp_type: "gelu"
    mlp_mult: 4.0        # hidden = 4 × 256 = 1024

  init:
    init_type: "fan_in"

optimizer:
  optimizer_type: "adamw"
  lr: 3.0e-4             # sweep this — keep everything else fixed
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  eps: 1.0e-8

scheduler:
  scheduler_type: "cosine_with_warmup"
  warmup_steps: 100
  t_max: 2000
  eta_min: 1.0e-5

logging:
  use_print_callback: true
  use_wandb: true
  wandb_project: "slm-first-benchmark"
  wandb_run_name: null
  wandb_tags: ["first-benchmark", "fineweb-edu", "lr-sweep"]

trainer:
  device: "cuda"
  precision: "fp32"      # fp32 first — removes precision as a confound
  seed: 42

  train_tokenizer_before_fit: true
  text_key: "text"
  max_seq_len: 128

  max_steps: 2000
  grad_accum_steps: 1
  clip_grad_norm: 1.0

  train_log_every: 50
  eval_every: 200
  max_eval_batches: 20

  save_checkpoints: false
  save_best_checkpoint: false
  num_sanity_val_steps: 0
  enable_anomaly_detection: false

  z_loss_coeff: 0.0      # off — clean baseline

data:
  mode: text
  backend: torch
  source_type: huggingface
  dataset_name: HuggingFaceFW/fineweb-edu
  dataset_config_name: sample-10BT
  train_split_name: train
  streaming: true
  text_fields: ["text"]

  val_fraction: 0.05
  split_seed: 42
  seed: 42
  shuffle: true
  shuffle_buffer_size: 1000
  max_train_samples: 20000
  max_val_samples: 500

  seq_len: 128
  batch_size: 32
  num_workers: 0
  pin_memory: true
  drop_last: true

tokenizer:
  tokenizer_type: "bpe"
  vocab_size: 16000
  min_frequency: 2
  pad_token: "<pad>"
  eos_token: "<eos>"
  unk_token: "<unk>"
  bos_token: null
  reuse_existing: true
  tokenizer_train_samples: 10000
  tokenizer_path: "artifacts/tokenizer/smoke/tokenizer.json"
  allow_missing_tokenizer: true

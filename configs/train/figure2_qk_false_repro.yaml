# figure2_qk_false_repro.yaml
#
# Reproduces the top-row "QK-norm=false, LR=0.1" condition from Figure 2.
# Goal: show delayed instability emerging under the paper's training schedule.
#
# Key design choices:
#   - LR=0.1, warmup=5000, cosine to t_max=95000 → matches paper's full schedule shape
#   - Only run 10k steps — early behaviour is what we're capturing
#   - weight_decay=0.0 in optimizer, independent_weight_decay=1e-4 (paper spec)
#   - z_loss=1e-4 on (paper default)
#   - qk_norm=false (the unstable condition)
#
# Compare against: figure2_qk_true_repro.yaml (same but qk_norm: true)

model:
  vocab_size: 32101
  max_seq_len: 128
  num_layers: 4
  model_dim: 128
  norm_type: "layernorm"
  norm_eps: 1.0e-6
  use_bias: false
  tie_embeddings: false

  attention:
    attention_type: "baseline"
    num_heads: 4
    num_kv_heads: 4
    rope_base: 10000.0
    qk_norm: false

  mlp:
    mlp_type: "gelu"
    mlp_mult: 4.0

  init:
    init_type: "fan_in"

optimizer:
  optimizer_type: "adamw"
  lr: 0.1 
  weight_decay: 0.0 # done 
  beta1: 0.9    # done 
  beta2: 0.95   # done 
  eps: 1.0e-8   # done 

scheduler:
  scheduler_type: "cosine_with_warmup"
  warmup_steps: 5000    # done 
  t_max: 95000          # shaped like full paper run — first 10k follows same LR curve
  eta_min: 1.0e-5

logging:
  use_print_callback: true
  use_wandb: true
  wandb_project: "slm-instability"
  wandb_run_name: "figure2-qk-false"
  wandb_tags: ["figure2", "qk-false", "c4"]

trainer:
  device: "cuda"
  precision: "bf16"
  seed: 42

  train_tokenizer_before_fit: false
  text_key: "text"
  max_seq_len: 512

  max_steps: 100000
  grad_accum_steps: 1
  clip_grad_norm: 1.0     # done 

  train_log_every: 1
  eval_every: 500
  max_eval_batches: 20

  save_checkpoints: false
  save_best_checkpoint: false
  num_sanity_val_steps: 0

  enable_anomaly_detection: false
  z_loss_coeff: 1.0e-4
  independent_weight_decay: 1.0e-4
  log_attn_logits: true
  log_grad_norm_inspect: true
  log_optimizer_inspect: true

data:
  mode: packed_text
  backend: torch
  source_type: huggingface
  dataset_name: allenai/c4
  dataset_config_name: en
  train_split_name: train
  streaming: true
  text_fields: ["text"]

  val_fraction: 0.05
  split_seed: 42
  seed: 42
  shuffle: true
  shuffle_buffer_size: 1000
  max_train_samples: null
  max_val_samples: 200

  seq_len: 512
  batch_size: 32
  num_workers: 0
  pin_memory: true
  drop_last: true

tokenizer:
  tokenizer_type: "sentencepiece"
  vocab_size: 32101
  reuse_existing: true
  tokenizer_path: "artifacts/tokenizer/c4_sentencepiece_32101/tokenizer.model"
  allow_missing_tokenizer: false

resource:
  # L40S: 48GB, ~181 TFLOPs bf16 (dense, non-sparse) — see scripts/slurm/train.slurm
  gpu_tflops: 181.0
  gpu_mem_gb: 48.0
  mfu: 0.35
  activation_memory_overhead: 1.2
  memory_budget_fraction: 0.90
  run_preflight: true
  abort_on_oom: false
  log_to_wandb: true
  write_json_summary: true
  sample_every_n_steps: 100

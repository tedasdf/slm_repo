model:
  vocab_size: 16000
  max_seq_len: 1024

  num_layers: 8
  model_dim: 512

  block_type: "baseline"
  norm_type: "rmsnorm"
  tie_embeddings: true
  logit_softcap: null

  attention:
    attention_type: "baseline"
    num_heads: 8
    num_kv_heads: 8
    head_dim: null
    rope_base: 10000.0
    qk_gain_init: 1.0
    window_size: null

  mlp:
    mlp_type: "swiglu"
    hidden_dim: null
    mlp_mult: 4.0

  init:
    init_std: 0.02
    tied_embed_init_std: null

optimizer:
  optimizer_type: "adamw"
  lr: 0.0003
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  eps: 1.0e-8

logging:
  use_print_callback: true
  use_wandb: false
  wandb_project: "slm-runs"
  wandb_run_name: "baseline_runtime"
  wandb_tags:
    - "baseline"
    - "runtime-tokenization"



trainer:
  train_tokenizer_before_fit: true     # fits BPE on first pass before step 1
  text_key: text
  device: "cuda"
  precision: "bf16"

 
  target_train_tokens: null
  max_seq_len: 1024

  max_steps: 500
  max_epochs: null

  grad_accum_steps: 1
  clip_grad_norm: 1.0

  train_log_every: 100
  eval_every: 100

  save_checkpoints: false
  checkpoint_every: 1000

  max_eval_batches: 50

  compile_model: false
  enable_anomaly_detection: false

  save_best_checkpoint: true
  metric_name_for_best: "val_loss"
  metric_mode_for_best: "min"

  num_sanity_val_steps: 2

data:
  mode: text
  backend: torch
  source_type: huggingface
  dataset_name: HuggingFaceFW/fineweb-edu
  dataset_config_name: sample-10BT    # omit line if no subset
  train_split_name: train
  val_split_name: null                 # set if dataset has a dedicated val split
  streaming: true
  text_fields: ["text"]

  val_fraction: 0.01                   # carves 1% from train as val
  split_seed: 42
  seed: 42
  shuffle: true
  shuffle_buffer_size: 10000
  max_train_samples: null
  max_val_samples: 200

  seq_len: 1024
  batch_size: 8
  num_workers: 0
  pin_memory: true
  drop_last: true
  
tokenizer:
  reuse_existing: true
  tokenizer_path: artifacts/tokenizer/runtime/tokenizer.json
  tokenizer_train_samples: 50000
  vocab_size: 16000
  tokenizer_type: "bpe"
  min_frequency: 2
  pad_token: "<pad>"
  eos_token: "<eos>"
  unk_token: "<unk>"
  bos_token: null
  allow_missing_tokenizer: false
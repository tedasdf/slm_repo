model:
  vocab_size: 16000
  max_seq_len: 512
  num_layers: 4
  model_dim: 256
  norm_type: "rmsnorm"
  norm_eps: 1.0e-6
  use_bias: false
  tie_embeddings: false

  attention:
    attention_type: "baseline"
    num_heads: 4
    num_kv_heads: 4
    rope_base: 10000.0
    qk_norm: false

  mlp:
    mlp_type: "gelu"
    mlp_mult: 4.0

  init:
    init_type: "fan_in"

optimizer:
  optimizer_type: "adamw"
  lr: 3.0e-4
  weight_decay: 1.0e-4
  beta1: 0.9
  beta2: 0.95
  eps: 1.0e-8

scheduler:
  scheduler_type: "cosine_with_warmup"
  warmup_steps: 10
  t_max: 100
  eta_min: 1.0e-5

logging:
  use_print_callback: true
  use_wandb: false
  wandb_project: "slm-smoke"
  wandb_run_name: "smoke"
  wandb_tags: ["smoke", "fineweb-edu"]

trainer:
  device: "cuda"
  precision: "bf16"
  seed: 42

  train_tokenizer_before_fit: true
  text_key: "text"
  max_seq_len: 512

  max_steps: 100
  grad_accum_steps: 1
  clip_grad_norm: 1.0

  train_log_every: 10
  eval_every: 50
  max_eval_batches: 10

  save_checkpoints: false
  save_best_checkpoint: false
  num_sanity_val_steps: 1

  enable_anomaly_detection: false
  z_loss_coeff: 1.0e-4
  independent_weight_decay: 1.0e-4

data:
  mode: text
  backend: torch
  source_type: huggingface
  dataset_name: HuggingFaceFW/fineweb-edu
  dataset_config_name: sample-10BT
  train_split_name: train
  streaming: true
  text_fields: ["text"]

  val_fraction: 0.05
  split_seed: 42
  seed: 42
  shuffle: true
  shuffle_buffer_size: 1000
  max_train_samples: 2000
  max_val_samples: 50

  seq_len: 512
  batch_size: 4
  num_workers: 0
  pin_memory: true
  drop_last: true

tokenizer:
  tokenizer_type: "bpe"
  vocab_size: 16000
  min_frequency: 2
  pad_token: "<pad>"
  eos_token: "<eos>"
  unk_token: "<unk>"
  bos_token: null
  reuse_existing: true
  tokenizer_train_samples: 2000
  tokenizer_path: "artifacts/tokenizer/smoke/tokenizer.json"
  allow_missing_tokenizer: true

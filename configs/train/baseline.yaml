tokenizer:
  tokenizer_type: "bpe"
  vocab_size: 16000
  min_frequency: 2
  pad_token: "<pad>"
  eos_token: "<eos>"
  unk_token: "<unk>"
  bos_token: null
  reuse_existing: true
  tokenizer_train_samples: 500000
  tokenizer_path: "artifacts/tokenizer/runtime/tokenizer.json"
  allow_missing_tokenizer: true


model:
  vocab_size: 16000
  max_seq_len: 1024

  num_layers: 8
  model_dim: 512

  block_type: "baseline"
  norm_type: "rmsnorm"
  tie_embeddings: true
  logit_softcap: null

  attention:
    attention_type: "baseline"
    num_heads: 8
    num_kv_heads: 8
    head_dim: null
    rope_base: 10000.0
    qk_gain_init: 1.0
    window_size: null

  mlp:
    mlp_type: "swiglu"
    hidden_dim: null
    mlp_mult: 4.0

  init:
    init_std: 0.02
    tied_embed_init_std: null

optimizer:
  optimizer_type: "adamw"
  lr: 0.0003
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  eps: 1.0e-8

logging:
  use_print_callback: true
  use_wandb: false
  wandb_project: "slm-runs"
  wandb_run_name: "baseline_runtime"
  wandb_tags:
    - "baseline"
    - "runtime-tokenization"

trainer:
  device: "cuda"
  precision: "bf16"

  world_size: 1

  train_tokenizer_before_fit: true
  text_key: "text"
  max_seq_len: 512

  max_steps: 10000
  max_epochs: null

  grad_accum_steps: 16
  clip_grad_norm: 1.0

  train_log_every: 100
  eval_every: 1000
  checkpoint_every: 1000

  max_eval_batches: null

  compile_model: false
  enable_anomaly_detection: false

  save_best_checkpoint: true
  metric_name_for_best: "val_loss"
  metric_mode_for_best: "min"

  num_sanity_val_steps: 0

dataset:
  source_type: "dolma_local"
  data_files_glob: "./artifacts/data/dolma_v1_6_sample/**/*.json.gz"
  dataset_name: "allenai/dolma3_mix-6T"
  dataset_config_name: "default"
  train_split_name: "train"
  val_split_name: null
  test_split_name: null
  text_fields: ["text"]
  cache_dir: "artifacts/data/hf_cache"
  streaming: true
  max_train_samples: null
  max_val_samples: null
  max_test_samples: null
  seed: 42
  shuffle: true
  shuffle_buffer_size: 10000

tokenizer:
  tokenizer_type: "bpe"
  vocab_size: 16000
  min_frequency: 2
  pad_token: "<pad>"
  eos_token: "<eos>"
  unk_token: "<unk>"
  bos_token: null
  reuse_existing: true
  tokenizer_train_samples: 500000
  tokenizer_path: "artifacts/tokenizer/runtime/tokenizer.json"
  allow_missing_tokenizer: true

data:
  use_online_tokenization: true
  seq_len: 512
  batch_size: 8
  stride: null
  shuffle_train: true
  num_workers: 0
  pin_memory: true
  drop_last: true
data:
  mode: text
  backend: ray
  source_type: parquet
  train_paths: s3://attention-ntp-pipeline-data-2026/datasets/dolma_v1_6_sample/**/*.json.gz
  val_paths: null
  text_fields: ["text"]

  max_train_samples: null
  max_val_samples: 2000
  val_fraction: 0.01
  split_seed: 42
  seed: 42
  shuffle: true
  shuffle_buffer_size: 10000

  seq_len: 1024
  batch_size: 8
  num_workers: 0
  pin_memory: true
  drop_last: true
  ray_prefetch_batches: 1
  

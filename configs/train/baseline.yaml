model:
  vocab_size: 32000
  max_seq_len: 1024
  num_layers: 8
  model_dim: 512
  tie_embeddings: true

  attention:
    attention_type: "baseline"
    num_heads: 8
    num_kv_heads: 8
    head_dim: 64
    rope_base: 10000.0
    qk_gain_init: 1.0

  mlp:
    mlp_type: "swiglu"
    mlp_mult: 4.0

  init:
    init_std: 0.02

optimizer:
  optimizer_type: "adamw"
  lr: 3.0e-4
  weight_decay: 1.0e-4
  beta1: 0.9
  beta2: 0.95
  eps: 1.0e-8

scheduler:
  scheduler_type: "cosine_with_warmup"
  warmup_steps: 5000
  t_max: 100000
  eta_min: 1.0e-5

logging:
  use_print_callback: true
  use_wandb: true
  wandb_project: "slm-runs"
  wandb_run_name: null
  wandb_tags: ["baseline", "fineweb-edu"]

trainer:
  device: "cuda"
  precision: "bf16"
  seed: 42

  train_tokenizer_before_fit: true
  text_key: "text"
  max_seq_len: 1024

  max_steps: 10000
  grad_accum_steps: 4
  clip_grad_norm: 1.0

  train_log_every: 100
  eval_every: 1000
  max_eval_batches: 50

  save_checkpoints: true
  checkpoint_every: 1000
  checkpoint_dir: "artifacts/checkpoints"
  save_best_checkpoint: true
  metric_name_for_best: "val_loss"
  metric_mode_for_best: "min"
  num_sanity_val_steps: 1
  z_loss_coeff: 1.0e-4

data:
  mode: text
  backend: torch
  source_type: huggingface
  dataset_name: HuggingFaceFW/fineweb-edu
  dataset_config_name: sample-10BT
  streaming: true
  text_fields: ["text"]

  max_train_samples: null
  max_val_samples: 2000
  val_fraction: 0.005
  split_seed: 42
  seed: 42
  shuffle: true
  shuffle_buffer_size: 10000

  seq_len: 1024
  batch_size: 8
  num_workers: 2
  pin_memory: true
  drop_last: true

tokenizer:
  tokenizer_type: "bpe"
  vocab_size: 32000
  min_frequency: 2
  pad_token: "<pad>"
  eos_token: "<eos>"
  unk_token: "<unk>"
  bos_token: null
  reuse_existing: true
  tokenizer_train_samples: 500000
  tokenizer_path: "artifacts/tokenizer/baseline/tokenizer.json"
  allow_missing_tokenizer: true

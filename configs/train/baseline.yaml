model:
  vocab_size: 16000
  max_seq_len: 1024
  num_layers: 8
  model_dim: 512
  tie_embeddings: true

  attention:
    num_heads: 8
    head_dim: 64
    num_kv_heads: 8
    rope_base: 10000.0
    qk_gain_init: 1.0

  mlp:
    mlp_mult: 4.0

optimizer:
  optimizer_type: "adamw"
  lr: 3.0e-4
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  eps: 1.0e-8

scheduler:
  scheduler_type: "cosine"
  t_max: null
  eta_min: 0.0

logging:
  use_print_callback: true
  use_wandb: true
  wandb_project: "slm-runs"
  wandb_run_name: null
  wandb_tags: ["baseline", "dolma"]
  wandb_config: null

trainer:
  device: "cuda"
  precision: "bf16"

  train_tokenizer_before_fit: false
  
  target_train_tokens: null
  text_key: "text"
  max_seq_len: 1024

  max_steps: 10000
  max_epochs: null

  grad_accum_steps: 1
  clip_grad_norm: 1.0

  train_log_every: 100
  eval_every: 1000

  save_checkpoints: false
  checkpoint_every: 1000

  max_eval_batches: 50

  compile_model: false
  enable_anomaly_detection: false

  save_best_checkpoint: true
  metric_name_for_best: "val_loss"
  metric_mode_for_best: "min"

  num_sanity_val_steps: 0


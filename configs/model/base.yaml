model:
  vocab_size: 1024
  max_seq_len: 1024
  num_layers: 9
  model_dim: 512
  block_type: baseline
  norm_type: rmsnorm
  tie_embeddings: true
  logit_softcap: 30.0

  attention:
    attention_type: xsa_gqa_swa
    num_heads: 8
    num_kv_heads: 4
    head_dim: 64
    rope_base: 10000.0
    qk_gain_init: 1.5
    window_size: 256

  mlp:
    mlp_type: relu2
    hidden_dim: null
    mlp_mult: 2.0

  init:
    init_std: 0.02
    tied_embed_init_std: 0.005
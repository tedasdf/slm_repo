version: "dolma_v1_6_sample_bpe16k"

dataset:
  source_type: "huggingface"
  data_files_glob: "./artifacts/data/dolma_v1_6_sample/**/*.json.gz"

  dataset_name: "allenai/dolma3_mix-6T"
  dataset_config_name: "default"

  train_split_name: "train"
  val_split_name: null
  test_split_name: null

  text_fields:
    - "text"

  cache_dir: "artifacts/data/hf_cache"
  streaming: true

  max_train_samples: null
  max_val_samples: null
  max_test_samples: null

  seed: 42
  shuffle: true
  shuffle_buffer_size: 10000

tokenizer:
  tokenizer_type: "bpe"
  vocab_size: 16000
  min_frequency: 2

  pad_token: "<pad>"
  eos_token: "<eos>"
  unk_token: "<unk>"
  bos_token: null

  reuse_existing: false
  tokenizer_train_samples: 500000

preprocess:
  block_size: 256
  packing: true
  truncation: true
  stride: null

  append_eos: true
  drop_short_sequences: true

  target_train_tokens: 100000000
  target_val_tokens: 1000000
  target_test_tokens: 0

  val_fraction: 0.01
  split_seed: 42

  shard_target_bytes: 268435456

  num_proc: 4
  debug: false